<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <rect width="200" height="80" fill="#1a1a1a"/>
  <!-- Colourful mosaic blocks imitating CHI '26 branding -->
  <rect x="8"  y="8"  width="10" height="10" fill="#e84427"/>
  <rect x="18" y="8"  width="10" height="10" fill="#f5a623"/>
  <rect x="8"  y="18" width="10" height="10" fill="#2176c7"/>
  <rect x="18" y="18" width="10" height="10" fill="#1db57a"/>
  <rect x="8"  y="28" width="10" height="10" fill="#f5a623"/>
  <rect x="18" y="28" width="10" height="10" fill="#e84427"/>
  <!-- CHI text -->
  <text x="32" y="52" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="38" fill="white">CHI</text>
  <!-- '26 smaller -->
  <text x="127" y="52" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="28" fill="#f5a623">'26</text>
  <!-- ACM label -->
  <text x="32" y="68" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="2">ACM CHI 2026</text>
</svg>
